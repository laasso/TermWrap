name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x64
            msbuild_platform: x64
          - platform: x86
            msbuild_platform: Win32

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Zydis (${{ matrix.platform }})
        shell: pwsh
        run: |
          # TermWrap headers declare Zydis as dllimport (__imp_* symbols), so Zydis must
          # be built as a DLL. "Release MD DLL" matches TermWrap's /MD CRT and produces
          # both Zydis.dll and the import Zydis.lib under bin\Release<Arch>\ — exactly
          # where TermWrap/EndpWrap expect them.
          $proj = Get-ChildItem -Path zydis -Recurse -Filter 'Zydis.vcxproj' -ErrorAction SilentlyContinue |
                  Where-Object { $_.FullName -match '\\msvc\\zydis\\' } |
                  Select-Object -First 1
          if (-not $proj) { throw "Zydis.vcxproj not found under zydis/msvc/zydis/" }
          Write-Host "Building $($proj.FullName)"
          & msbuild $proj.FullName /m '/p:Configuration=Release MD DLL' /p:Platform=${{ matrix.msbuild_platform }}
          if ($LASTEXITCODE -ne 0) { throw "Zydis build failed" }
          # Sanity check the expected output exists
          $archDir = if ('${{ matrix.platform }}' -eq 'x64') { 'ReleaseX64' } else { 'ReleaseX86' }
          $lib = Join-Path 'zydis\msvc\bin' "$archDir\Zydis.lib"
          if (-not (Test-Path $lib)) {
              Get-ChildItem zydis\msvc\bin -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
              throw "Expected $lib not produced by Zydis build"
          }

      - name: Build TermWrap (${{ matrix.platform }})
        shell: cmd
        run: msbuild TermWrap.sln /m /p:Configuration=Release /p:Platform=${{ matrix.msbuild_platform }}

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage/TermWrap-${{ matrix.platform }}"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          $plat = "${{ matrix.msbuild_platform }}"
          $outRoots = @(
            "$plat\Release",
            "TermWrap\$plat\Release",
            "UmWrap\$plat\Release",
            "EndpWrap\$plat\Release"
          )

          $dlls = @('TermWrap.dll')
          if ('${{ matrix.platform }}' -eq 'x64') {
            $dlls += @('UmWrap.dll','EndpWrap.dll')
          }

          foreach ($dll in $dlls) {
            $found = Get-ChildItem -Recurse -Filter $dll -ErrorAction SilentlyContinue |
                     Where-Object { $_.FullName -match "\\$plat\\Release\\" } |
                     Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination $stage -Force
              Write-Host "Staged $($found.FullName)"
            } else {
              Write-Warning "$dll not found for $plat"
            }
          }

          # Zydis.dll is a runtime dependency of TermWrap (dllimport linkage).
          $archDir = if ('${{ matrix.platform }}' -eq 'x64') { 'ReleaseX64' } else { 'ReleaseX86' }
          $zydisDll = Join-Path 'zydis\msvc\bin' "$archDir\Zydis.dll"
          if (Test-Path $zydisDll) {
            Copy-Item $zydisDll -Destination $stage -Force
            Write-Host "Staged $zydisDll"
          } else {
            Write-Warning "Zydis.dll not found at $zydisDll"
          }

          if (Test-Path 'dist') {
            Get-ChildItem 'dist' -Filter '*.reg' -ErrorAction SilentlyContinue |
              Copy-Item -Destination $stage -Force
          }

          Compress-Archive -Path "$stage\*" -DestinationPath "TermWrap-${{ matrix.platform }}.zip" -Force
          Get-ChildItem "TermWrap-${{ matrix.platform }}.zip" | Format-List

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TermWrap-${{ matrix.platform }}
          path: TermWrap-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.zip
            install.ps1
